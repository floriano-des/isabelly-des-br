<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="author" content="Isabelly Lima">
  <meta name="robots" content="noindex, nofollow, noarchive">
  <meta name="description" content="Treino semanal de academia da Isabelly.">
  <link rel="canonical" href="https://isabelly.des.br/treino">
  <meta property="og:title" content="Treino da Isabelly">
  <meta property="og:description" content="Treino semanal de academia da Isabelly.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://isabelly.des.br/treino">
  <meta property="og:locale" content="pt_BR">
  <link rel="icon" type="image/webp" href="media/favicon.webp">
  <title>Treino da Isabelly</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400..800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange:      #9669e5;
      --orange-dark: #7d52cf;
      --dark:        #111111;
      --dark-2:      #151515;
      --dark-3:      #1c1b21;
      --dark-4:      #26242c;
      --green:       #1d9e75;
      --green-light: #5dcaa5;
      --text:        rgba(255,255,255,0.90);
      --muted:       rgba(205,203,209,0.68);
      --border:      rgba(205,203,209,0.10);
      --border-2:    rgba(205,203,209,0.18);
      --radius-sm:   8px;
      --radius-md:   16px;
      --radius-full: 99px;
      --font:        'Syne', sans-serif;
    }

    html { background: var(--dark); }

    body {
      font-family: var(--font);
      background: var(--dark);
      color: var(--text);
      min-height: 100dvh;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior: none;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: min(100%, 620px);
      margin: 0 auto;
      padding: 22px 20px 0;
    }
    .header-logo {
      font-size: 0.7rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--orange);
    }
    .header-reset {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--muted);
      background: none;
      border: none;
      cursor: pointer;
      font-family: var(--font);
      padding: 4px 8px;
    }
    .header-reset:active { opacity: 0.6; }

    /* Day tabs */
    .day-tabs {
      display: flex;
      gap: 8px;
      width: min(100%, 620px);
      margin: 0 auto;
      padding: 16px 20px 12px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .day-tabs::-webkit-scrollbar { display: none; }

    .day-tab {
      flex-shrink: 0;
      padding: 9px 18px;
      border-radius: var(--radius-full);
      font-size: 0.78rem;
      font-weight: 700;
      border: 1px solid var(--border-2);
      cursor: pointer;
      background: var(--dark-3);
      color: var(--muted);
      font-family: var(--font);
      transition: all 0.18s;
    }
    .day-tab.active        { background: var(--orange); color: var(--dark); border-color: var(--orange); }
    .day-tab.sanda         { border-color: rgba(29,158,117,0.35); color: var(--green-light); }
    .day-tab.sanda.active  { background: var(--green); color: #fff; border-color: var(--green); }
    .day-tab.rest          { opacity: 0.55; }
    .day-tab.rest.active   { background: var(--dark-4); color: #fff; border-color: var(--border-2); opacity: 1; }

    /* Content */
    .content {
      width: min(100%, 620px);
      margin: 0 auto;
      padding: 4px 20px 120px;
    }

    .day-header { margin-bottom: 20px; }
    .day-title  { font-size: 1.75rem; font-weight: 700; color: #fff; line-height: 1.15; }
    .day-sub    { font-size: 0.82rem; color: var(--muted); margin-top: 4px; font-weight: 500; }

    /* Section label */
    .section-label {
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 26px 0 10px;
    }

    /* Exercise card */
    .ex-card {
      background: var(--dark-3);
      border-radius: var(--radius-md);
      padding: 14px 16px;
      margin-bottom: 10px;
      border: 1px solid var(--border);
      transition: border-color 0.2s;
    }
    .ex-card.complete { border-color: rgba(29,158,117,0.35); }

    .ex-top {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 12px;
    }

    .ex-info    { flex: 1; min-width: 0; }
    .ex-name    { font-size: 0.93rem; font-weight: 600; color: #fff; line-height: 1.3; }
    .ex-note    { font-size: 0.72rem; color: var(--orange); margin-top: 4px; font-weight: 500; line-height: 1.4; }
    .ex-alt     { font-size: 0.68rem; color: rgba(255,255,255,0.42); margin-top: 4px; font-weight: 500; line-height: 1.4; }
    .ex-alt::before { content: "↔ "; color: rgba(255,255,255,0.30); }

    /* Timer button */
    .timer-btn {
      flex-shrink: 0;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: 2px solid var(--border-2);
      background: var(--dark-4);
      color: var(--muted);
      font-family: var(--font);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1px;
      transition: all 0.2s;
      line-height: 1.2;
    }
    .timer-btn:active       { transform: scale(0.91); }
    .timer-btn.running      { border-color: var(--orange); color: var(--orange); background: rgba(180,120,238,0.12); }
    .timer-btn.finished     { border-color: var(--green); color: var(--green-light); background: rgba(29,158,117,0.12); }
    .timer-btn-time         { font-size: 0.88rem; font-weight: 700; }
    .timer-btn-label        { font-size: 0.55rem; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; }

    /* Sets row */
    .ex-bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
    }
    .sets-row {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .sets-info {
      font-size: 0.75rem;
      color: var(--muted);
      font-weight: 500;
      margin-right: 4px;
    }
    .set-dot {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: 1.5px solid var(--border-2);
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65rem;
      font-weight: 700;
      color: var(--muted);
      transition: all 0.15s;
      font-family: var(--font);
    }
    .set-dot.done {
      background: var(--orange);
      border-color: var(--orange);
      color: var(--dark);
    }

    /* Badge */
    .badge {
      font-size: 0.6rem;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: var(--radius-full);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .badge-orange { background: rgba(180,120,238,0.15); color: var(--orange); }
    .badge-blue   { background: rgba(55,138,221,0.13); color: #85b7eb; }
    .badge-green  { background: rgba(29,158,117,0.15); color: var(--green-light); }

    /* Sanda and rest cards */
    .sanda-card {
      background: rgba(29,158,117,0.08);
      border: 1px solid rgba(29,158,117,0.25);
      border-radius: var(--radius-md);
      padding: 32px 24px;
      text-align: center;
      margin-top: 8px;
    }
    .sanda-icon  { font-size: 3rem; margin-bottom: 14px; }
    .sanda-title { font-size: 1.3rem; font-weight: 700; color: var(--green-light); }
    .sanda-tip   { font-size: 0.82rem; color: var(--muted); margin-top: 10px; line-height: 1.7; }

    .rest-card   { text-align: center; padding: 64px 20px; }
    .rest-icon   { font-size: 2.5rem; margin-bottom: 14px; }
    .rest-text   { font-size: 0.9rem; color: var(--muted); line-height: 1.6; }

    /* Timer overlay */
    .timer-overlay {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--dark-2);
      border-top: 1px solid var(--border-2);
      border-radius: 24px 24px 0 0;
      width: min(100%, 620px);
      margin: 0 auto;
      padding: 18px 24px 36px;
      transform: translateY(100%);
      transition: transform 0.28s cubic-bezier(0.32,0.72,0,1);
      z-index: 200;
    }
    .timer-overlay.visible { transform: translateY(0); }

    .timer-drag {
      width: 36px; height: 4px;
      background: var(--border-2);
      border-radius: 99px;
      margin: 0 auto 16px;
    }

    .timer-ov-label {
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      text-align: center;
      margin-bottom: 4px;
    }
    .timer-ov-name {
      font-size: 0.9rem;
      font-weight: 600;
      color: #fff;
      text-align: center;
      margin-bottom: 18px;
      line-height: 1.3;
    }
    .timer-big {
      font-size: 4.5rem;
      font-weight: 700;
      text-align: center;
      color: var(--orange);
      letter-spacing: -0.03em;
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }
    .timer-bar {
      height: 3px;
      background: var(--border);
      border-radius: 4px;
      margin: 18px 0;
      overflow: hidden;
    }
    .timer-bar-fill {
      height: 100%;
      background: var(--orange);
      border-radius: 4px;
      transition: width 0.8s linear;
      width: 100%;
    }
    .timer-controls {
      display: flex;
      gap: 12px;
      justify-content: center;
    }
    .timer-ctrl {
      flex: 1;
      max-width: 150px;
      padding: 15px;
      border-radius: var(--radius-full);
      border: none;
      font-family: var(--font);
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.18s;
    }
    .timer-ctrl:active  { transform: scale(0.96); }
    .timer-ctrl.primary { background: var(--orange); color: var(--dark); }
    .timer-ctrl.secondary { background: var(--dark-4); color: var(--text); border: 1px solid var(--border-2); }
  </style>
</head>
<body>

<div class="header">
  <span class="header-logo">Treino · Isabelly</span>
  <button class="header-reset" type="button" onclick="resetDay()">Zerar dia</button>
</div>

<div class="day-tabs" id="dayTabs"></div>
<div class="content"  id="content"></div>

<!-- Timer overlay -->
<div class="timer-overlay" id="timerOverlay">
  <div class="timer-drag"></div>
  <div class="timer-ov-label" id="timerLabel">descanso</div>
  <div class="timer-ov-name"  id="timerExName"></div>
  <div class="timer-big"      id="timerDisplay">1:00</div>
  <div class="timer-bar"><div class="timer-bar-fill" id="timerBarFill"></div></div>
  <div class="timer-controls">
    <button class="timer-ctrl secondary" type="button" onclick="stopTimer()">Cancelar</button>
    <button class="timer-ctrl primary" type="button" id="timerPauseBtn" onclick="togglePause()">Pausar</button>
  </div>
</div>

<script>
const DAYS = [
  {
    id:'seg', label:'Seg', type:'gym', day:'Segunda', sub:'Inferiores · Foco Principal',
    tip:'Dia pesado de perna. 48h até o Sanda. Capricha no hip thrust, é o que mais entrega.',
    core:[
      {name:'Glute bridge com peso',      sets:3, reps:'15 rep',       note:'Ativação de glúteo, faz com calma',       timer:45,  timed:false},
      {name:'Pallof press no cabo',       sets:3, reps:'12 cada lado', note:'Anti-rotacional, transfere para o clinch', timer:45,  timed:false},
      {name:'Pescoço (flexão/extensão)',  sets:2, reps:'15 cada',      note:'Com a mão ou faixa, leve',                timer:45,  timed:false},
    ],
    main:[
      {name:'Agachamento livre',          sets:4, reps:'6-8 rep', note:'Profundidade boa, joelho alinhado',        timer:120, timed:false, badge:'base'},
      {name:'Hip thrust com barra',       sets:4, reps:'8 rep',   note:'Apertar glúteo no topo, 1s de pausa',      timer:90,  timed:false, badge:'base'},
      {name:'Stiff com barra',            sets:4, reps:'10 rep',  note:'Quadril articula, costas neutras',         alt:'Stiff com halteres', timer:90,  timed:false},
      {name:'Afundo reverso com halteres',sets:3, reps:'10 cada perna', note:'Passo pra trás, mais amigável com joelho', alt:'Afundo estacionário com halteres', timer:90,  timed:false},
      {name:'Cadeira abdutora',           sets:3, reps:'15 rep',  note:'Glúteo médio, formato lateral',            alt:'Abdução de quadril com elástico (mini band acima do joelho)', timer:45,  timed:false},
      {name:'Panturrilha em pé',          sets:3, reps:'15 rep',  note:'Pico de contração no topo',                alt:'Panturrilha no Smith', timer:45,  timed:false},
    ]
  },
  {
    id:'ter', label:'Ter', type:'rest', day:'Terça', sub:'Descanso · Recupera para o Sanda'},
  {
    id:'qua', label:'Qua', type:'sanda', day:'Quarta', sub:'Sanda',
    tip:'Sem academia hoje. Foca em timing, footwork e sparring. O treino já é o esforço.'
  },
  {
    id:'qui', label:'Qui', type:'gym', day:'Quinta', sub:'Full Body B · Ênfase em Superiores',
    tip:'Dia de superiores com manutenção de perna. Goblet leve no início, sem chegar perto da falha.',
    core:[
      {name:'Lenhador no cabo',           sets:3, reps:'10 cada lado', note:'Rotacional, transfere para chute e soco', timer:45,  timed:false},
      {name:'Elevação de pernas nas paralelas', sets:3, reps:'12 rep', note:'Joelho dobrado se 12 estendido for difícil', timer:60, timed:false},
      {name:'Pescoço (lateral)',          sets:2, reps:'15 cada',      note:'Com a mão ou faixa, leve',                timer:45, timed:false},
    ],
    main:[
      {name:'Agachamento goblet',         sets:3, reps:'12 rep',  note:'Manutenção de perna, carga moderada, sem chegar na falha', timer:60,  timed:false},
      {name:'Supino reto com halteres',   sets:4, reps:'10 rep',  note:'Halter > barra pra mobilidade do ombro',   alt:'Supino reto com barra', timer:90,  timed:false},
      {name:'Remada curvada com barra',   sets:4, reps:'10 rep',  note:'Costas grossas, postura',                  alt:'Remada cavalinho (T-bar) ou remada curvada com halteres', timer:90,  timed:false},
      {name:'Desenvolvimento c/ halteres',sets:3, reps:'10 rep',  note:'Ombro forte protege na luta',              alt:'Desenvolvimento com barra', timer:90,  timed:false},
      {name:'Puxada frontal',             sets:3, reps:'10 rep',  note:'Dorsal, abre as costas',                   alt:'Barra fixa', timer:90,  timed:false},
      {name:'Tríceps corda',              sets:3, reps:'12 rep',  note:'Finalizador',                              alt:'Tríceps na polia com barra reta', timer:45,  timed:false},
      {name:'Rosca direta',               sets:3, reps:'10 rep',  note:'Finalizador',                              alt:'Rosca alternada com halteres', timer:45,  timed:false},
    ]
  },
  {
    id:'sex', label:'Sex', type:'sanda', day:'Sexta', sub:'Sanda',
    tip:'Se a perna ainda estiver pesada de segunda, avisa o professor. Melhor adaptar do que lesionar.'
  },
  {id:'sab', label:'Sáb', type:'rest', day:'Sábado',  sub:'Descanso'},
  {id:'dom', label:'Dom', type:'rest', day:'Domingo', sub:'Descanso'},
];

const STORAGE_KEY = 'isabelly-treino-sets-v1';
let activeDay = 'seg';
let setsDone  = loadSetsDone();
let timerInterval   = null;
let timerRemaining  = 0;
let timerTotal      = 0;
let timerPaused     = false;
let activeTimerKey  = null;

/* Day tabs */
function renderDayTabs() {
  document.getElementById('dayTabs').innerHTML = DAYS.map(d =>
    `<button type="button" class="day-tab ${d.type==='sanda'?'sanda':''} ${d.type==='rest'?'rest':''} ${d.id===activeDay?'active':''}"
      onclick="selectDay('${d.id}')">${d.label}</button>`
  ).join('');
}

function selectDay(id) {
  activeDay = id;
  stopTimer();
  renderDayTabs();
  renderContent();
}

function resetDay() {
  const prefix = activeDay + '-';
  Object.keys(setsDone).forEach(k => { if (k.startsWith(prefix)) delete setsDone[k]; });
  saveSetsDone();
  renderContent();
}

/* Content */
function renderContent() {
  const d = document.getElementById('content');
  const day = DAYS.find(x => x.id === activeDay);

  if (day.type === 'rest') {
    const restMsg = day.sub && day.sub !== 'Descanso'
      ? day.sub.replace('Descanso · ', '')
      : 'O músculo cresce aqui, não na academia.';
    d.innerHTML = `<div class="day-header">
        <div class="day-title">${day.day}</div>
        <div class="day-sub">${day.sub}</div>
      </div>
      <div class="rest-card">
        <div class="rest-icon">😴</div>
        <p class="rest-text">Descanso ativo.<br>${restMsg}</p>
      </div>`;
    return;
  }

  if (day.type === 'sanda') {
    d.innerHTML = `<div class="day-header">
        <div class="day-title">${day.day}</div>
        <div class="day-sub">${day.sub}</div>
      </div>
      <div class="sanda-card">
        <div class="sanda-icon">🥋</div>
        <div class="sanda-title">Treino de Sanda</div>
        <div class="sanda-tip">${day.tip}</div>
      </div>`;
    return;
  }

  let html = `<div class="day-header">
    <div class="day-title">${day.day}</div>
    <div class="day-sub">${day.sub}</div>
  </div>`;

  html += `<div class="section-label">Preparação · Core e Pescoço</div>`;
  html += day.core.map((ex, i) => exCard(day.id, 'core', i, ex)).join('');

  html += `<div class="section-label">Treino Principal</div>`;
  html += day.main.map((ex, i) => exCard(day.id, 'main', i, ex)).join('');

  d.innerHTML = html;
}

function exCard(dayId, section, idx, ex) {
  const total = ex.sets;
  const done  = countDone(dayId, section, idx, total);
  const complete = done === total;

  const btnKey = `${dayId}-${section}-${idx}`;
  const isRunning = activeTimerKey === btnKey;

  const timerLabel = formatTime(ex.timer);
  const btnType = ex.timed ? 'iniciar' : 'descanso';
  const btnClass = isRunning ? 'running' : (complete ? 'finished' : '');

  let badge = '';
  if (ex.badge === 'explosivo') badge = `<span class="badge badge-orange">explosivo</span>`;
  else if (section === 'core')  badge = `<span class="badge badge-blue">aquecimento</span>`;
  else if (complete)            badge = `<span class="badge badge-green">concluído</span>`;

  let dotsHtml = '';
  for (let s = 0; s < total; s++) {
    const key = `${dayId}-${section}-${idx}-${s}`;
    const d   = setsDone[key];
    dotsHtml += `<button type="button" class="set-dot ${d?'done':''}" onclick="toggleSet('${key}')">${d?'✓':s+1}</button>`;
  }

  return `<div class="ex-card ${complete?'complete':''}">
    <div class="ex-top">
      <div class="ex-info">
        <div class="ex-name">${ex.name}</div>
        ${ex.note ? `<div class="ex-note">${ex.note}</div>` : ''}
        ${ex.alt ? `<div class="ex-alt">${ex.alt}</div>` : ''}
      </div>
      <button type="button" class="timer-btn ${btnClass}" onclick="startTimer('${dayId}','${section}',${idx})">
        <span class="timer-btn-time">${timerLabel}</span>
        <span class="timer-btn-label">${btnType}</span>
      </button>
    </div>
    <div class="ex-bottom">
      <div class="sets-row">
        <span class="sets-info">${ex.sets}x ${ex.reps}</span>
        ${dotsHtml}
      </div>
      ${badge}
    </div>
  </div>`;
}

function countDone(dayId, section, idx, total) {
  let n = 0;
  for (let s = 0; s < total; s++) { if (setsDone[`${dayId}-${section}-${idx}-${s}`]) n++; }
  return n;
}

function toggleSet(key) {
  if (setsDone[key]) delete setsDone[key];
  else setsDone[key] = true;
  saveSetsDone();
  renderContent();
}

function loadSetsDone() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
  } catch (error) {
    return {};
  }
}

function saveSetsDone() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(setsDone));
  } catch (error) {
    return;
  }
}

/* Timer */
function startTimer(dayId, section, idx) {
  const day = DAYS.find(x => x.id === dayId);
  const ex  = day[section][idx];
  const key = `${dayId}-${section}-${idx}`;

  if (activeTimerKey === key && timerInterval) { stopTimer(); return; }

  stopTimer();
  activeTimerKey  = key;
  timerRemaining  = ex.timer;
  timerTotal      = ex.timer;
  timerPaused     = false;

  document.getElementById('timerLabel').textContent  = ex.timed ? 'exercício' : 'descanso';
  document.getElementById('timerExName').textContent = ex.name;
  document.getElementById('timerPauseBtn').textContent = 'Pausar';

  document.getElementById('timerOverlay').classList.add('visible');
  updateTimerDisplay();
  timerInterval = setInterval(tick, 1000);
  renderContent();
}

function tick() {
  if (timerPaused) return;
  timerRemaining--;
  if (timerRemaining <= 0) {
    timerRemaining = 0;
    updateTimerDisplay();
    clearInterval(timerInterval);
    timerInterval = null;
    if (navigator.vibrate) navigator.vibrate([250, 120, 250, 120, 400]);
    setTimeout(() => {
      document.getElementById('timerOverlay').classList.remove('visible');
      activeTimerKey = null;
      renderContent();
    }, 1800);
    return;
  }
  updateTimerDisplay();
}

function updateTimerDisplay() {
  const m = Math.floor(timerRemaining / 60);
  const s = timerRemaining % 60;
  document.getElementById('timerDisplay').textContent = `${m}:${s.toString().padStart(2,'0')}`;
  document.getElementById('timerBarFill').style.width = ((timerRemaining / timerTotal) * 100) + '%';
}

function togglePause() {
  timerPaused = !timerPaused;
  document.getElementById('timerPauseBtn').textContent = timerPaused ? 'Retomar' : 'Pausar';
}

function stopTimer() {
  clearInterval(timerInterval);
  timerInterval  = null;
  activeTimerKey = null;
  timerPaused    = false;
  document.getElementById('timerOverlay').classList.remove('visible');
  renderContent();
}

function formatTime(s) {
  const m = Math.floor(s / 60);
  const sec = s % 60;
  if (m > 0) return `${m}:${sec.toString().padStart(2,'0')}`;
  return `${sec}s`;
}

/* Init */
renderDayTabs();
renderContent();
</script>
